<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול האתר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
        body { font-family: 'Heebo', sans-serif; background-color: #0f172a; color: white;}
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- מסך אימות סיסמה -->
    <div id="login-screen" class="bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700 w-full max-w-md text-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-indigo-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
        <h2 class="text-2xl font-bold mb-6">כניסת מנהלים בלבד</h2>
        <input type="password" id="password-input" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 mb-4 text-center text-lg focus:outline-none focus:border-indigo-500" placeholder="הקש קוד סודי" dir="ltr">
        <button id="login-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition">כניסה</button>
        <p id="error-msg" class="text-red-400 text-sm mt-4 hidden">קוד שגוי.</p>
    </div>

    <!-- מסך הניהול (מוסתר כברירת מחדל) -->
    <div id="admin-dashboard" class="hidden bg-slate-800 p-8 md:p-12 rounded-[2rem] shadow-2xl border border-slate-700 w-full max-w-2xl">
        <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-black text-indigo-400">לוח בקרה וניהול</h1>
            <a href="index.html" class="text-sm bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg transition">חזרה לאתר</a>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-700 mb-6">
            <h3 class="text-xl font-bold mb-2 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-yellow-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" /></svg>
                עדכון באנר הודעות
            </h3>
            <p class="text-slate-400 text-sm mb-4">הטקסט שיוכנס כאן יופיע בבאנר קופץ בתחתית המסך אצל המשתמשים. כדי להסיר את הבאנר, השאר את התיבה ריקה ושמור.</p>
            
            <textarea id="announcement-input" rows="3" class="w-full bg-slate-800 border border-slate-600 rounded-xl p-4 text-white focus:outline-none focus:border-indigo-500 resize-none" placeholder="הקלד כאן הודעה למאזינים (לדוגמה: פרק חדש של הרב עולה היום בערב)..."></textarea>
            
            <button id="save-btn" class="mt-4 bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-8 rounded-xl transition shadow-lg flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>
                שמור ועדכן באתר
            </button>
            <span id="save-success" class="text-green-400 text-sm font-bold mr-4 hidden opacity-0 transition-opacity">נשמר בהצלחה!</span>
        </div>
    </div>

    <script>
        // --- הגדרות הניהול ---
        const SECRET_CODE = "1234"; // שנה את הסיסמה כאן למה שתרצה
        
        // לוגיקת כניסה
        document.getElementById('login-btn').addEventListener('click', attemptLogin);
        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') attemptLogin();
        });

        function attemptLogin() {
            const input = document.getElementById('password-input').value;
            if (input === SECRET_CODE) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                
                // טעינת ההודעה הקיימת
                const existing = localStorage.getItem('site_announcement');
                if (existing) document.getElementById('announcement-input').value = existing;
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        // לוגיקת שמירה
        document.getElementById('save-btn').addEventListener('click', function() {
            const text = document.getElementById('announcement-input').value;
            localStorage.setItem('site_announcement', text);
            
            // חיווי הצלחה
            const successMsg = document.getElementById('save-success');
            successMsg.classList.remove('hidden');
            setTimeout(() => successMsg.classList.remove('opacity-0'), 10);
            setTimeout(() => {
                successMsg.classList.add('opacity-0');
                setTimeout(() => successMsg.classList.add('hidden'), 300);
            }, 3000);
        });
    </script>
</body>
</html>
