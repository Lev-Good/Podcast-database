<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאגר הפודקאסטים - סייר הקבצים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap');
        
        body { 
            font-family: 'Heebo', sans-serif; 
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 32px 32px;
            padding-bottom: 60px;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* עיצוב לאייפרים (נגן גוגל) */
        iframe {
            width: 100%;
            height: 140px; /* גובה סטנדרטי לנגן גוגל משובץ */
            border-radius: 12px;
            border: none;
            background-color: #f1f5f9;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen relative overflow-x-hidden selection:bg-indigo-100 selection:text-indigo-900">
    
    <nav class="w-full bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="font-black text-xl tracking-tight text-indigo-900 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
                סייר המאגר
            </div>
            <a href="about.html" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors bg-slate-100 hover:bg-indigo-50 px-4 py-2 rounded-full">אודות והצטרפות</a>
        </div>
    </nav>

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-5xl h-[300px] bg-gradient-to-b from-indigo-500/10 via-purple-500/5 to-transparent blur-3xl -z-10 rounded-full pointer-events-none"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
        
        <!-- סרגל "פירורי לחם" (ניווט תיקיות) -->
        <div class="bg-white/80 backdrop-blur-xl p-4 rounded-2xl shadow-sm border border-white mb-8 flex items-center gap-2 overflow-x-auto whitespace-nowrap" id="breadcrumbs">
            <!-- יתמלא דרך ה-JS -->
        </div>

        <div id="error-msg" class="hidden max-w-3xl mx-auto text-center text-red-600 bg-red-50 p-6 rounded-2xl border border-red-100 mb-8 font-medium"></div>

        <!-- תצוגת טעינה -->
        <div id="loading-spinner" class="hidden flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-slate-200 border-t-indigo-600 mb-4"></div>
            <p class="text-slate-500 font-medium font-bold">טוען נתונים מהדרייב...</p>
        </div>

        <!-- אזור התוכן: גריד שמציג תיקיות וקבצים -->
        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- התוכן יוזרק לכאן -->
        </div>
    </div>

    <!-- קרדיט ליוצר האתר -->
    <div class="w-full text-center text-slate-400 text-xs py-6 mt-8">
        נוצר על ידי <a href="https://mytovmail.github.io/Good-heart/" target="_blank" class="text-indigo-400 hover:text-indigo-600 transition-colors font-bold">לב טוב</a>
    </div>

    <script>
        // --- חובה לעדכן: הכתובת החדשה שקיבלת מהסקריפט החדש שיצרנו! ---
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyGIavueF5eYZP542khG6WSYztk-OA6wadPJp9pBiCvJpg--opvOmDm6iqvH4EWzoWGVA/exec'; 
        const ROOT_FOLDER_ID = '1YvJzJJlKzKMunkYQWAqwFGK6VElIW-WT';
        
        // היסטוריית ניווט
        let navigationStack = [{ id: ROOT_FOLDER_ID, name: 'ראשי' }];
        let isMember = false;
        let siteConfig = { groupPassword: "", announcement: "" };

        async function initApp() {
            try {
                if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                    const res = await fetch('config.json?v=' + new Date().getTime());
                    if (res.ok) siteConfig = await res.json();
                }
                const savedPassword = localStorage.getItem('site_password');
                isMember = (savedPassword === siteConfig.groupPassword && siteConfig.groupPassword !== "");
            } catch(e) { console.error("שגיאה בטעינת הגדרות", e); }

            // נטען את התיקייה הראשונה
            loadFolder(ROOT_FOLDER_ID);
        }

        async function loadFolder(folderId) {
            if (GAS_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
                showError('חובה להכניס את כתובת ה-Google Apps Script המעודכנת.');
                return;
            }

            const grid = document.getElementById('content-grid');
            const spinner = document.getElementById('loading-spinner');
            
            grid.innerHTML = '';
            spinner.classList.remove('hidden');
            document.getElementById('error-msg').classList.add('hidden');

            renderBreadcrumbs();

            try {
                // שולחים בקשה לסקריפט עם מזהה התיקייה הספציפית
                const response = await fetch(`${GAS_URL}?folderId=${folderId}`);
                if (!response.ok) throw new Error("שגיאת רשת");
                const data = await response.json();

                if (data.error) throw new Error(data.error);

                spinner.classList.add('hidden');
                renderContent(data.folders, data.files);

            } catch (err) {
                spinner.classList.add('hidden');
                showError('שגיאה בטעינת התיקייה. ייתכן ואין הרשאות, או שיש בעיית תקשורת.');
            }
        }

        function renderBreadcrumbs() {
            const container = document.getElementById('breadcrumbs');
            container.innerHTML = '';

            navigationStack.forEach((navItem, index) => {
                const btn = document.createElement('button');
                btn.className = `font-bold ${index === navigationStack.length - 1 ? 'text-slate-800' : 'text-indigo-600 hover:text-indigo-800'} transition-colors`;
                btn.textContent = navItem.name;
                
                // לחיצה על פירור לחם מחזירה אחורה לאותה תיקייה
                btn.onclick = () => {
                    if (index < navigationStack.length - 1) {
                        navigationStack = navigationStack.slice(0, index + 1);
                        loadFolder(navItem.id);
                    }
                };

                container.appendChild(btn);

                // הוספת מפריד '>' אם זה לא האיבר האחרון
                if (index < navigationStack.length - 1) {
                    const sep = document.createElement('span');
                    sep.className = 'text-slate-400 mx-2 select-none font-normal';
                    sep.textContent = '/';
                    container.appendChild(sep);
                }
            });
        }

        function renderContent(folders, files) {
            const grid = document.getElementById('content-grid');
            
            if (folders.length === 0 && files.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-12 bg-white rounded-2xl shadow-sm border border-slate-100 font-medium">התיקייה ריקה.</div>';
                return;
            }

            // סידור הקבצים מהחדש לישן
            files.sort((a, b) => new Date(b.createdTime) - new Date(a.createdTime));

            // הצגת תיקיות תחילה
            folders.forEach(folder => {
                const card = document.createElement('div');
                card.className = 'fade-in bg-white p-5 rounded-2xl shadow-sm hover:shadow-md border border-slate-100 cursor-pointer transition-all transform hover:-translate-y-1 flex items-center gap-4 group';
                card.onclick = () => {
                    navigationStack.push({ id: folder.id, name: folder.name });
                    loadFolder(folder.id);
                };
                
                card.innerHTML = `
                    <div class="bg-indigo-50 p-3 rounded-xl text-indigo-500 group-hover:bg-indigo-500 group-hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 20 20" fill="currentColor"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" /></svg>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <h3 class="font-bold text-slate-800 text-lg truncate">${folder.name}</h3>
                        <p class="text-xs text-slate-400 font-medium">תיקייה</p>
                    </div>
                `;
                grid.appendChild(card);
            });

            // הצגת קבצים
            files.forEach(file => {
                const cleanName = file.name.replace(/\.[^/.]+$/, "");
                const formattedDate = new Date(file.createdTime).toLocaleDateString('he-IL');
                
                // הקישור שמפעיל את הנגן המובנה של גוגל דרייב שיודע לטפל בהרשאות משתמש
                const previewUrl = `https://drive.google.com/file/d/${file.id}/preview`;

                const card = document.createElement('div');
                card.className = 'fade-in bg-white rounded-2xl p-6 shadow-sm border border-slate-100 flex flex-col justify-between';
                
                let playerHTML = '';
                if (isMember) {
                    // שימוש ב-iframe של גוגל במקום ב-audio. גוגל תזהה אוטומטית אם יש לו הרשאה לדרייב או לא.
                    playerHTML = `<iframe src="${previewUrl}" allow="autoplay" class="mt-4"></iframe>`;
                } else {
                    playerHTML = `
                    <div class="relative mt-4 h-[140px] bg-slate-50 rounded-xl border border-slate-200 overflow-hidden">
                        <div class="absolute inset-0 flex flex-col items-center justify-center bg-white/50 backdrop-blur-sm z-10">
                            <a href="about.html" class="bg-indigo-600 text-white text-sm font-bold px-5 py-2.5 rounded-full shadow-lg hover:bg-indigo-700 transition-colors">
                                הצטרף כדי להאזין
                            </a>
                        </div>
                    </div>`;
                }

                card.innerHTML = `
                    <div class="mb-2">
                        <div class="flex justify-between items-start mb-2">
                            <span class="inline-flex items-center px-2 py-1 rounded text-[10px] font-bold bg-slate-100 text-slate-500 uppercase">קובץ שמע</span>
                            <span class="text-[11px] text-slate-400 font-medium">${formattedDate}</span>
                        </div>
                        <h3 class="font-bold text-slate-800 leading-snug line-clamp-2" title="${cleanName}">${cleanName}</h3>
                    </div>
                    ${playerHTML}
                `;
                grid.appendChild(card);
            });
        }

        function showError(msg) {
            const errorEl = document.getElementById('error-msg');
            errorEl.textContent = msg;
            errorEl.classList.remove('hidden');
        }

        // הפעלה
        initApp();
    </script>
</body>
</html>
